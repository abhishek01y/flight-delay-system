<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Delay Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 550px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }
        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
            font-family: inherit;
        }
        select:focus, input:focus {
            border-color: #667eea;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .result.ontime {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }
        .result.delayed {
            background: #ffebee;
            border: 2px solid #f44336;
        }
        .result h2 {
            font-size: 22px;
            margin-bottom: 5px;
        }
        .result.ontime h2 { color: #2e7d32; }
        .result.delayed h2 { color: #c62828; }
        .result .prob {
            font-size: 28px;
            font-weight: 700;
        }
        .result.ontime .prob { color: #4caf50; }
        .result.delayed .prob { color: #f44336; }
        .result .label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #aaa;
            font-size: 12px;
        }
        .error { color: #f44336; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flight Delay Prediction</h1>
        <p class="subtitle">Enter flight details to predict delay status</p>

        <form method="POST">
            <div class="form-group">
                <label for="airline">Airline</label>
                <select name="airline" id="airline" required>
                    <option value="">-- Select Airline --</option>
                    {% for a in airlines %}
                    <option value="{{ a }}" {% if input_data and input_data.airline == a %}selected{% endif %}>{{ a }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="departure_date">Departure Date</label>
                    <input type="date" name="departure_date" id="departure_date" required
                           value="{{ input_data.departure_date if input_data else '' }}">
                </div>
                <div class="form-group">
                    <label for="departure_time">Time</label>
                    <input type="time" name="departure_time" id="departure_time" required
                           value="{{ input_data.departure_time if input_data else '' }}">
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="temperature">Temperature (°C)</label>
                    <input type="number" name="temperature" id="temperature" step="1" required
                           placeholder="e.g. 25" min="-10" max="50"
                           value="{{ input_data.temperature if input_data else '' }}">
                </div>
                <div class="form-group">
                    <label for="visibility">Visibility (km)</label>
                    <select name="visibility" id="visibility" required>
                        <option value="">-- Select --</option>
                        {% for v in [5, 10, 15, 20, 25] %}
                        <option value="{{ v }}" {% if input_data and input_data.visibility == v|string %}selected{% endif %}>{{ v }} km</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="wind_speed">Wind Speed (km/h)</label>
                <input type="number" name="wind_speed" id="wind_speed" step="1" required
                       placeholder="e.g. 15" min="0" max="60"
                       value="{{ input_data.wind_speed if input_data else '' }}">
            </div>

            <button type="submit" class="btn">Predict Flight Status</button>
        </form>

        {% if prediction %}
        <div class="result {{ result_class }}">
            <div class="label">Prediction Result</div>
            <h2>{{ prediction }}</h2>
            <div class="prob">{{ probability }}%</div>
            <div class="label">confidence</div>
            {% if delay_str %}
            <div style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed {% if result_class == 'delayed' %}#f44336{% else %}#4caf50{% endif %};">
                <div class="label">Expected Delay Duration</div>
                <div style="font-size: 24px; font-weight: 700; color: #c62828;">{{ delay_str }}</div>
            </div>
            {% endif %}
        </div>
        {% endif %}

        <div class="footer">Flight Delay Prediction System</div>
    </div>
</body>
</html>
